spring:
  application:
    name: ai-commerce-platform

  datasource:
    url: jdbc:h2:mem:aicommerce;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  batch:
    job:
      enabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: ai-commerce-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.hoya.aicommerce.common.kafka.message

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

redis:
  enabled: ${REDIS_ENABLED:false}

kafka:
  enabled: ${KAFKA_ENABLED:false}

server:
  port: 9090

jwt:
  secret: ${JWT_SECRET:ai-commerce-platform-secret-key-for-jwt-authentication-hs256}
  expiration-ms: 86400000

encryption:
  secret: ${ENCRYPTION_SECRET:ai-commerce-encrypt-key-for-dev!}

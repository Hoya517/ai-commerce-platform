spring:
  application:
    name: ai-commerce-platform

  datasource:
    url: jdbc:h2:mem:aicommerce;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  batch:
    job:
      enabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

redis:
  enabled: ${REDIS_ENABLED:false}

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 9090

jwt:
  secret: ${JWT_SECRET:ai-commerce-platform-secret-key-for-jwt-authentication-hs256}
  expiration-ms: 86400000

encryption:
  secret: ${ENCRYPTION_SECRET:ai-commerce-encrypt-key-for-dev!}
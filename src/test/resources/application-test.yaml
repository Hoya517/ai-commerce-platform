spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

redis:
  enabled: false

  datasource:
    url: jdbc:h2:mem:aicommerce-test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  batch:
    job:
      enabled: false

jwt:
  secret: test-secret-key-for-jwt-authentication-hs256-minimum-32chars
  expiration-ms: 3600000

encryption:
  secret: test-encrypt-key-for-dev!!!
